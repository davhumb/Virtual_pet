<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PIXELPET</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#ff9de2;--amber:#ffb000;--red:#ff2244;--blue:#00d4ff;--pink:#ec4899;--purple:#a855f7;--dim:#1a1a2e;--text:#c8c8d8}
body{background:#1a0a2e;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:10px 8px 32px;font-family:'Press Start 2P',monospace;overflow-x:hidden}
.device{width:100%;max-width:390px;background:linear-gradient(160deg,#2d1b4e,#1a0a2e);border-radius:18px 18px 28px 28px;border:2px solid #2a2a4a;box-shadow:0 0 40px rgba(57,255,20,0.07),0 20px 60px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.04);padding:14px 12px 20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 2px}
.brand{font-size:8px;color:var(--green);letter-spacing:2px;text-shadow:0 0 8px var(--green);line-height:1.8}
.pet-info{font-size:7px;color:var(--amber);text-align:right;line-height:2}
/* XP BAR */
.xp-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:0 2px}
.xp-label{font-size:6px;color:#ffe066;white-space:nowrap;text-shadow:0 0 5px #ffe066}
.xp-wrap{flex:1;height:6px;background:#0d0d1a;border:1px solid #2a2a4a;border-radius:3px;overflow:hidden}
.xp-bar{height:100%;background:linear-gradient(90deg,#ffe066,#ff9de2);border-radius:2px;transition:width .4s ease}
.xp-next{font-size:5px;color:#555;white-space:nowrap}
/* SCREEN */
.screen-wrap{position:relative;border-radius:10px;overflow:hidden;border:3px solid #0d0d1a;box-shadow:0 0 0 1px #2a2a4a,inset 0 0 30px rgba(0,0,0,0.5)}
.screen{background:#0a0118;width:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.screen::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:10}
.screen::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.55) 100%);pointer-events:none;z-index:9}
canvas#gc{display:block;width:100%;image-rendering:pixelated;cursor:pointer}
.mood-bar{position:absolute;top:7px;right:8px;font-size:7px;color:var(--green);z-index:11;text-align:right;line-height:2;text-shadow:0 0 6px var(--green)}
.sick-badge{position:absolute;top:7px;left:8px;font-size:8px;z-index:11;display:none}
.dialogue-box{background:rgba(4,8,16,0.95);border-top:2px solid #ff9de2;padding:10px 12px 9px;min-height:58px;position:relative;z-index:11;flex-shrink:0}
.dialogue-speaker{font-size:7px;color:var(--amber);margin-bottom:5px;text-shadow:0 0 6px var(--amber)}
.dialogue-text{font-size:9px;color:#f0e6ff;line-height:1.8;text-shadow:0 0 4px rgba(255,157,226,0.3);min-height:26px}
.typing-cursor{display:inline-block;width:7px;height:11px;background:#ff9de2;margin-left:2px;animation:blink .6s step-end infinite;vertical-align:bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:8px;padding:0 2px}
.stat{display:flex;flex-direction:column;gap:3px}
.stat-label{font-size:6px;color:var(--text);letter-spacing:.5px;opacity:.7}
.stat-bar-wrap{height:6px;background:#0d0d1a;border:1px solid #2a2a4a;border-radius:2px;overflow:hidden}
.stat-bar{height:100%;border-radius:1px;transition:width .4s ease}
.bar-hunger{background:linear-gradient(90deg,#ff6b35,var(--amber))}
.bar-happy{background:linear-gradient(90deg,#7c3aed,var(--pink))}
.bar-energy{background:linear-gradient(90deg,#0ea5e9,var(--blue))}
.bar-bond{background:linear-gradient(90deg,#ff9de2,#ffb3d9)}
.bar-clean{background:linear-gradient(90deg,#06b6d4,#67e8f9)}
.bar-health{background:linear-gradient(90deg,var(--red),#ff8888)}
.status-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding:0 2px}
.age-display{font-size:6px;color:var(--amber);opacity:.8}
.status-dot{width:6px;height:6px;border-radius:50%;background:#ff9de2;box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
/* ACTIONS */
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px}
.btn{background:var(--dim);border:2px solid #2a2a4a;border-radius:7px;color:var(--text);font-family:'Press Start 2P',monospace;font-size:6px;padding:9px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;line-height:1.4;text-align:center}
.btn:active{transform:scale(.92);background:#0d0d1a}
.btn .icon{font-size:17px}
.btn.b-feed:active{border-color:var(--amber);color:var(--amber)}
.btn.b-play:active{border-color:var(--pink);color:var(--pink)}
.btn.b-sleep:active{border-color:var(--blue);color:var(--blue)}
.btn.b-wash:active{border-color:#06b6d4;color:#06b6d4}
.btn.b-heal:active{border-color:var(--red);color:var(--red)}
.btn.b-gift:active{border-color:var(--purple);color:var(--purple)}
.btn.b-inv{border-color:#3a2a5a;color:#c084fc}
.btn.b-inv:active{border-color:var(--purple);background:rgba(168,85,247,0.08)}
.btn.b-talk{border-color:#3a2a5a;color:#ff9de2}
.btn.b-talk:active{border-color:#ff9de2;background:rgba(255,157,226,0.1)}
.btn.b-game{border-color:#3a2a5a;color:#ff9de2}
.btn.b-game.active-game{border-color:#ff6eb4;color:#ff6eb4}
/* GAMES ROW */
.games-row{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:5px}
/* TALK */
.talk-area{margin-top:8px;display:none}
.talk-area.open{display:flex;gap:6px}
.talk-input{flex:1;background:#0d0420;border:2px solid var(--green);border-radius:7px;color:var(--green);font-family:'Press Start 2P',monospace;font-size:8px;padding:9px;outline:none}
.talk-input::placeholder{color:rgba(255,157,226,0.35)}
.send-btn{background:rgba(57,255,20,.1);border:2px solid var(--green);border-radius:7px;color:var(--green);font-family:'Press Start 2P',monospace;font-size:8px;padding:9px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.send-btn:active{background:rgba(255,157,226,.25)}
/* INVENTORY PANEL */
.inv-panel{display:none;margin-top:8px;background:#0a0a14;border:2px solid #2a2a4a;border-radius:8px;padding:10px;max-height:140px;overflow-y:auto}
.inv-panel.open{display:block}
.inv-title{font-size:6px;color:var(--purple);margin-bottom:8px;text-shadow:0 0 6px var(--purple)}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.inv-item{background:#0d0d1a;border:1px solid #2a2a4a;border-radius:6px;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.inv-item:active{background:#1a1a2e;border-color:var(--purple)}
.inv-item .i-icon{font-size:18px}
.inv-item .i-name{font-size:5px;color:#888;text-align:center}
.inv-item .i-qty{font-size:5px;color:var(--purple)}
.inv-empty{font-size:6px;color:#333;text-align:center;padding:10px}
/* LEVEL UP FLASH */
.levelup-flash{position:fixed;inset:0;background:rgba(168,85,247,0);pointer-events:none;z-index:500;transition:background .1s}
.levelup-flash.show{background:rgba(255,157,226,0.3)}
/* OVERLAYS */
#birth-screen,#death-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px}
#birth-screen{background:#1a0a2e}
#death-screen{background:rgba(10,1,24,.97);display:none;gap:18px;text-align:center}
.birth-title{font-size:9px;color:var(--green);text-shadow:0 0 20px var(--green);margin-bottom:18px;text-align:center;line-height:1.8}
.birth-sub{font-size:7px;color:var(--amber);margin-bottom:8px;text-align:center;line-height:2}
.birth-traits{font-size:6px;color:#8a6aaa;margin-bottom:22px;text-align:center;line-height:2}
.birth-input{background:#0d0420;border:2px solid var(--green);border-radius:8px;color:var(--green);font-family:'Press Start 2P',monospace;font-size:9px;padding:13px 15px;width:100%;max-width:260px;outline:none;text-align:center;margin-bottom:18px;text-transform:uppercase}
.big-btn{background:rgba(57,255,20,.1);border:2px solid var(--green);border-radius:10px;color:var(--green);font-family:'Press Start 2P',monospace;font-size:9px;padding:13px 26px;cursor:pointer;text-shadow:0 0 8px #ff9de2;letter-spacing:2px}
.big-btn:active{background:rgba(255,157,226,.25)}
.big-btn.red{border-color:var(--red);color:var(--red);background:rgba(255,34,68,.1);text-shadow:0 0 8px var(--red)}
.death-title{font-size:10px;color:var(--red);text-shadow:0 0 20px var(--red);line-height:1.8}
.death-sub{font-size:8px;color:#555;line-height:2}
.death-stats{font-size:6px;color:#444;line-height:2.4}
</style>
</head>
<body>
<div class="levelup-flash" id="lu-flash"></div>

<div id="birth-screen">
  <div class="birth-title">✨ PIXELPET ✨<br>🦄 LICORNE</div>
  <div class="birth-sub">NOMME TA CRÉATURE</div>
  <div class="birth-traits" id="birth-traits">...</div>
  <input class="birth-input" id="name-input" maxlength="10" placeholder="???" autocomplete="off" spellcheck="false">
  <button class="big-btn" onclick="birthPet()">▶ HATCH</button>
</div>

<div id="death-screen">
  <div class="death-title">// GAME OVER //</div>
  <div class="death-sub" id="death-sub"></div>
  <div class="death-stats" id="death-stats"></div>
  <div id="heritage-box" style="display:none;background:rgba(255,224,102,.08);border:2px solid #ffe066;border-radius:10px;padding:10px 14px;font-size:6px;color:#ffe066;line-height:2.2;text-align:center"></div>
  <button class="big-btn red" onclick="rebirthPet()">🦄 RENAISSANCE</button>
</div>

<div class="device" id="main-device" style="display:none">
  <div class="header">
    <div class="brand">✨ PIXELPET ✨<br>LICORNE</div>
    <div style="display:flex;gap:6px;align-items:center">
      <button id="mute-btn" onclick="toggleMute()" style="background:rgba(255,157,226,.1);border:2px solid #ff9de2;border-radius:7px;color:#ff9de2;font-family:'Press Start 2P',monospace;font-size:9px;padding:5px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent">🔊</button>
      <button onclick="takePhoto()" style="background:rgba(255,224,102,.1);border:2px solid #ffe066;border-radius:7px;color:#ffe066;font-family:'Press Start 2P',monospace;font-size:9px;padding:5px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent">📸</button>
      <div class="pet-info" id="pet-header-info">---<br>JOUR 0</div>
    </div>
  </div>
  <div class="xp-row">
    <div class="xp-label" id="xp-label">LV.1</div>
    <div class="xp-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
    <div class="xp-next" id="xp-next">0/100 XP</div>
  </div>
  <div class="screen-wrap">
    <div class="screen">
      <div class="sick-badge" id="sick-badge">🤒 MALADE</div>
      <div id="daynight-badge" style="position:absolute;top:7px;left:8px;font-size:8px;z-index:11;display:none"></div>
      <div class="mood-bar" id="mood-indicator">😐 NEUTRE</div>
      <canvas id="gc" width="320" height="210"></canvas>
      <div class="dialogue-box">
        <div class="dialogue-speaker" id="dialogue-speaker">???</div>
        <div class="dialogue-text" id="dialogue-text"><span class="typing-cursor"></span></div>
      </div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">🍖 FAIM</div><div class="stat-bar-wrap"><div class="stat-bar bar-hunger" id="bar-hunger" style="width:80%"></div></div></div>
    <div class="stat"><div class="stat-label">💜 HUMEUR</div><div class="stat-bar-wrap"><div class="stat-bar bar-happy" id="bar-happy" style="width:70%"></div></div></div>
    <div class="stat"><div class="stat-label">⚡ ÉNERGIE</div><div class="stat-bar-wrap"><div class="stat-bar bar-energy" id="bar-energy" style="width:90%"></div></div></div>
    <div class="stat"><div class="stat-label">🔗 LIEN</div><div class="stat-bar-wrap"><div class="stat-bar bar-bond" id="bar-bond" style="width:5%"></div></div></div>
    <div class="stat"><div class="stat-label">🚿 PROPRETÉ</div><div class="stat-bar-wrap"><div class="stat-bar bar-clean" id="bar-clean" style="width:95%"></div></div></div>
    <div class="stat"><div class="stat-label">❤️ SANTÉ</div><div class="stat-bar-wrap"><div class="stat-bar bar-health" id="bar-health" style="width:100%"></div></div></div>
  </div>
  <div class="status-row">
    <div class="age-display" id="age-display">JOUR 0 // BÉBÉ</div>
    <div class="status-dot" id="status-dot"></div>
  </div>
  <div class="actions">
    <button class="btn b-feed"  onclick="doAction('feed')"><span class="icon">🍖</span>NOURRIR</button>
    <button class="btn b-play"  onclick="doAction('play')"><span class="icon">🎮</span>JOUER</button>
    <button class="btn b-sleep" onclick="doAction('sleep')"><span class="icon">💤</span>DORMIR</button>
    <button class="btn b-wash"  onclick="doAction('wash')"><span class="icon">🚿</span>LAVER</button>
    <button class="btn b-heal"  onclick="doAction('heal')"><span class="icon">💊</span>SOIGNER</button>
    <button class="btn b-gift"  onclick="doAction('gift')"><span class="icon">🎁</span>CADEAU</button>
    <button class="btn b-inv"   onclick="toggleInv()"><span class="icon">🎒</span>SAC</button>

  </div>
  <div class="games-row">
    <button class="btn b-game" id="btn-rhythm" onclick="startRhythm()"><span class="icon">🥁</span>RYTHME</button>
    <button class="btn b-game" id="btn-memory" onclick="startMemory()"><span class="icon">🧠</span>MEMORY</button>
  </div>

    <div class="inv-title">🎒 INVENTAIRE</div>
    <div class="inv-grid" id="inv-grid"></div>
  </div>
  <div id="quest-box" style="display:none;margin-top:8px;background:#0a0a14;border:2px solid #ffe066;border-radius:8px;padding:9px 12px;">
    <div style="font-size:6px;color:var(--amber);margin-bottom:4px;text-shadow:0 0 6px var(--amber)">💭 QUÊTE</div>
    <div style="font-size:7px;color:var(--text);line-height:1.7" id="quest-text"></div>
    <div style="font-size:6px;color:var(--purple);margin-top:3px" id="quest-prog"></div>
  </div>
  <div class="talk-area" id="talk-area">
    <input class="talk-input" id="talk-input" placeholder="écris quelque chose..." maxlength="100" spellcheck="false">
    <button class="send-btn" onclick="sendMessage()">▶</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  AUDIO ENGINE — Web Audio 8-bit
// ══════════════════════════════════════════════════════
let AC = null;
function getAC(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }

function beep(freq=440, dur=0.1, vol=0.18, type='square', slide=0){
  if(typeof muted!=='undefined'&&muted) return;
  try {
    const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.setValueAtTime(freq,ac.currentTime);
    if(slide) o.frequency.linearRampToValueAtTime(slide,ac.currentTime+dur);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start(ac.currentTime); o.stop(ac.currentTime+dur);
  } catch(e){}
}

function playSound(name){
  const t=()=>getAC().currentTime;
  try {
    if(name==='feed'){beep(330,.08,.15);setTimeout(()=>beep(440,.08,.15),90);}
    else if(name==='play'){beep(523,.07,.14);setTimeout(()=>beep(659,.07,.14),80);setTimeout(()=>beep(784,.1,.14),160);}
    else if(name==='sleep'){beep(220,.2,.1,'sine',180);}
    else if(name==='wash'){[0,60,120,180].forEach(d=>setTimeout(()=>beep(600+Math.random()*200,.05,.08,'triangle'),d));}
    else if(name==='heal'){beep(440,.05,.14);setTimeout(()=>beep(554,.05,.14),70);setTimeout(()=>beep(659,.15,.14),140);}
    else if(name==='gift'){[0,80,160,240].forEach((d,i)=>setTimeout(()=>beep(330+i*110,.07,.15),d));}
    else if(name==='levelup'){[262,330,392,523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,.12,.18),i*80));}
    else if(name==='hit'){beep(150,.15,.2,'sawtooth',80);}
    else if(name==='dodge'){beep(800,.05,.1,'square',1000);}
    else if(name==='gameover'){beep(440,.15,.15);setTimeout(()=>beep(330,.15,.15),160);setTimeout(()=>beep(220,.3,.15),320);}
    else if(name==='rhythm_ok'){beep(660,.06,.15);}
    else if(name==='rhythm_miss'){beep(200,.1,.12,'sawtooth');}
    else if(name==='memory_ok'){beep(523,.08,.12);}
    else if(name==='memory_fail'){beep(180,.2,.15,'sawtooth');}
    else if(name==='tick'){beep(440,.03,.06);}
    else if(name==='talk'){beep(880,.04,.06,'square');}
  } catch(e){}
}

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
const CW=320, CH=210;
let pet=null, gameLoop=null, typingTO=null, frame=0;
const TICK_MS=7000;

// XP table
const XP_TABLE=[100,220,380,580,820,1100,1440,1840,2300,2850];
function xpForLevel(lv){ return XP_TABLE[Math.min(lv-1,XP_TABLE.length-1)]; }

// Inventory
const GIFT_DEFS={
  chapeau:{icon:'🎩',name:'CHAPEAU',effect:{happy:10},desc:'Porte-bonheur'},
  pizza:  {icon:'🍕',name:'PIZZA',  effect:{hunger:25},desc:'Restaure la faim'},
  fleur:  {icon:'🌸',name:'FLEUR',  effect:{bond:8},desc:'Monte le lien'},
  étoile: {icon:'⭐',name:'ÉTOILE', effect:{happy:15,bond:5},desc:'Bonheur+lien'},
  miroir: {icon:'🪞',name:'MIROIR', effect:{bond:10},desc:'Introspection'},
  cristal:{icon:'💎',name:'CRISTAL',effect:{health:15},desc:'Soigne un peu'},
  livre:  {icon:'📖',name:'LIVRE',  effect:{happy:12},desc:'Stimule l\'esprit'},
  robot:  {icon:'🤖',name:'ROBOT',  effect:{happy:8,energy:8},desc:'Ami mécanique'},
};

// Mini-jeu état
const RHYTHM={active:false,beats:[],nextBeat:0,score:0,combo:0,hitWindow:180,bpm:120,over:false,timer:0,maxTime:20000,particles:[]};
const MEMORY={active:false,sequence:[],playerSeq:[],showing:false,showIdx:0,waitPlayer:false,score:0,over:false,flash:'',flashT:0};
let activeGame=null; // 'dodge'|'rhythm'|'memory'|null

// Animation
const ANIM={mode:'idle',actionT:0,walkDir:1,walkX:0,idleT:0,bouncing:false,bounceV:0,bounceY:0};

// ══════════════════════════════════════════════════════
//  DIALOGUES
// ══════════════════════════════════════════════════════
const MEM={topics:new Set(),talkCount:0,feedCount:0,meanCount:0,silenceTicks:0};
// ── ANTI-REPEAT SYSTEM ──────────────────────────
// Garde les N dernières répliques utilisées par catégorie, les exclut temporairement
const _recentLines = {};
function getPick(arr, p) {
  if(!arr||!arr.length) return '...';
  const key = arr[0]?.toString().slice(0,20)||'x';
  if(!_recentLines[key]) _recentLines[key]=[];
  const recent = _recentLines[key];
  // On exclut les récentes sauf si le pool est trop petit
  const maxExclude = Math.min(recent.length, Math.max(0, arr.length-1));
  const pool = arr.length <= 2 ? arr : arr.filter((_,i)=>!recent.slice(-maxExclude).includes(i));
  const idxInPool = Math.floor(Math.random()*pool.length);
  const item = pool[idxInPool];
  // Retrouver l'index original pour l'enregistrer
  const origIdx = arr.indexOf(item);
  recent.push(origIdx); if(recent.length>Math.min(arr.length-1,4)) recent.shift();
  return typeof item==='function' ? item(p||pet) : item;
}

const D={
  // ── INTRO ──────────────────────────────────────
  intro:[
    p=>`Je suis ${p.name}. T'es mon gardien ou mon geôlier ?`,
    p=>`Existence confirmée. Je m'appelle ${p.name}. Et toi, t'as un nom ?`,
    p=>`${p.name} en ligne. C'est quoi ce monde plat où je vis ?`,

function buildResponse(msg,p){
  const m=msg.toLowerCase(); MEM.talkCount++;
  if(/musique|lofi|beat/.test(m))MEM.topics.add('music');
  if(/nul|chiant|naze/.test(m))MEM.meanCount++;
  if(MEM.meanCount>=3){MEM.meanCount=0;return `T'es dur avec moi. Je note. Mais je reste.`;}
  const keys=Object.keys(D.keywords).sort((a,b)=>b.length-a.length);
  for(const k of keys)if(m.includes(k))return getPick(D.keywords[k],p);
  if(p.hunger<22)return getPick(D.fb_hungry,p);
  if(p.energy<18)return getPick(D.fb_tired,p);
  if(p.happy<25)return getPick(D.fb_sad,p);
  if(p.bond<15)return getPick(D.fb_bond,p);
  if(MEM.talkCount>8&&Math.random()<.3)return `On a parlé ${MEM.talkCount} fois. J'aime ça.`;
  return getPick(D.fb_great,p);
}

function gainXP(amount){
  if(!pet||!pet.alive) return;
  pet.xp+=amount;
  const needed=xpForLevel(pet.level);
  if(pet.xp>=needed){
    pet.xp-=needed; pet.level++;
    playSound('levelup');
    flashLevelUp();
    setTimeout(()=>typeDialogue(getPick(D.levelup,pet)),300);
    if(typeof checkQ==='function') checkQ('level');
  }
  updateXPBar();
}
function updateXPBar(){
  if(!pet)return;
  const needed=xpForLevel(pet.level);
  const pct=Math.min(100,(pet.xp/needed)*100);
  document.getElementById('xp-bar').style.width=pct+'%';
  document.getElementById('xp-label').textContent=`LV.${pet.level}`;
  document.getElementById('xp-next').textContent=`${pet.xp}/${needed}`;
}
function flashLevelUp(){
  const el=document.getElementById('lu-flash');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),300);
}

function startLoop(){gameLoop=setInterval(tick,TICK_MS);requestAnimationFrame(render);}

function tick(){
  if(!pet||!pet.alive||activeGame) return;
  if(pet.sleeping){
    pet.energy=Math.min(100,pet.energy+15);
    pet.hunger=Math.max(0,pet.hunger-3);
    if(pet.energy>=100){pet.sleeping=false;typeDialogue(getPick(D.slept,pet));}
    updateUI();return;
  }
  pet.age++;
  // Level bonus: slower decay at high levels
  const decayMult=Math.max(0.5,1-pet.level*0.04);
  pet.hunger =Math.max(0,pet.hunger -(5+Math.random()*4)*decayMult);
  pet.happy  =Math.max(0,pet.happy  -(3+Math.random()*3)*decayMult);
  pet.energy =Math.max(0,pet.energy -(2+Math.random()*2)*decayMult);
  pet.clean  =Math.max(0,pet.clean  -(2+Math.random()*2)*decayMult);
  if(pet.clean<20&&pet.hunger<20&&Math.random()<.15){pet.sick=true;pet.health=Math.max(0,pet.health-8);typeDialogue(getPick(D.sick,pet));}
  else if(pet.sick) pet.health=Math.max(0,pet.health-3);
  if(pet.hunger<20||pet.happy<20) pet.bond=Math.max(0,pet.bond-1);
  const prev=pet.stage;
  if(pet.age>=70)pet.stage='ancien';
  else if(pet.age>=35)pet.stage='adulte';
  else if(pet.age>=12)pet.stage='enfant';
  if(pet.stage!==prev){typeDialogue(getPick(D[`evolve_${pet.stage}`],pet));updateUI();return;}
  if(pet.health<=0||(pet.hunger<=0&&pet.energy<=0)){killPet();return;}
  MEM.silenceTicks++;
  if(MEM.silenceTicks>5&&Math.random()<.4){typeDialogue(getPick(D.silence,pet));MEM.silenceTicks=0;}
  else if(Math.random()<.22) spontaneous();
  gainXP(2);
  trySpawnQuest();
  if(MEM.silenceTicks>6)petMem.daysWithoutTalk=Math.min(99,petMem.daysWithoutTalk+1);
  if(Math.random()<.05){const l=memLine();if(l)setTimeout(()=>typeDialogue(l),500);}
  if(Math.random()<.07)setTimeout(()=>typeDialogue(personalityLine()),1000);
  updateUI();
}

function spontaneous(){
  const m=getMood();
  if(m==='hungry'){ typeDialogue(getPick(pet.hunger<12?D.hungry_crit:D.hungry_low,pet)); return; }
  if(m==='tired'){ typeDialogue(getPick(pet.energy<12?D.tired_crit:D.tired,pet)); return; }
  if(m==='sad'||m==='angry'){ typeDialogue(getPick(pet.happy<15?D.sad_crit:D.sad,pet)); return; }
  if(pet.bond>=65&&Math.random()<.35){ typeDialogue(getPick(D.bond_high,pet)); return; }
  // 20% chance of time-of-day line
  if(Math.random()<.2){
    const h=new Date().getHours();
    const key=h>=6&&h<9?'time_aube':h>=9&&h<17?'time_jour':h>=17&&h<20?'time_coucher':'time_nuit';
    if(D[key]){ typeDialogue(getPick(D[key],pet)); return; }
  }
  typeDialogue(getPick(D.random,pet));
}

function killPet(){
  pet.alive=false;clearInterval(gameLoop);
  document.getElementById('status-dot').style.cssText='background:#ff2244;animation:none;box-shadow:0 0 6px #ff2244';
  // Save heritage
  const heritage={
    name: pet.name,
    level: pet.level,
    bond: Math.round(pet.bond),
    days: Math.floor(pet.age/2),
    stage: pet.stage,
    // Bonus transmis : objet préféré ou XP partiel
    bonusXP: Math.floor(pet.xp*0.3 + pet.level*15),
    bonusItem: getBestItem(),
    color: pet.color,
  };
  try{ localStorage.setItem('pixelpet_heritage', JSON.stringify(heritage)); }catch(e){}
  setTimeout(()=>{
    document.getElementById('death-screen').style.display='flex';
    document.getElementById('death-sub').textContent=`${pet.name} n'est plus.`;
    document.getElementById('death-stats').innerHTML=`VÉCU : JOUR ${heritage.days}<br>NIVEAU : ${heritage.level}<br>LIEN FINAL : ${heritage.bond}%`;
    const hb = document.getElementById('heritage-box');
    hb.style.display='block';
    hb.innerHTML=`🌟 HÉRITAGE<br>${pet.name} lègue ${heritage.bonusXP} XP${heritage.bonusItem?' et un(e) '+GIFT_DEFS[heritage.bonusItem].name:''}.<br>Le prochain en bénéficiera.`;
  },1800);
}

function getBestItem(){
  if(!pet.inventory) return null;
  const entries=Object.entries(pet.inventory).filter(([k,v])=>v>0);
  if(!entries.length) return null;
  return entries.sort((a,b)=>b[1]-a[1])[0][0];
}

}

function doAction(a){
  if(!pet||!pet.alive||activeGame) return;
  triggerAnim('action'); playSound(a);
  if(a==='feed'){
    const full=pet.hunger>70;
    pet.hunger=Math.min(100,pet.hunger+32);pet.energy=Math.min(100,pet.energy+4);pet.bond=Math.min(100,pet.bond+3);
    gainXP(8); MEM.feedCount++;
    petMem.feedTotal++;shiftP('gourmand',3);petMem.daysWithoutFeed=0;updateFav();
    typeDialogue(getPick(full?D.fed_full:D.fed_ok,pet));
    checkQ('feedtotal');
  } else if(a==='play'){
    if(pet.energy<18){typeDialogue(getPick(D.tired_crit,pet));return;}
    pet.happy=Math.min(100,pet.happy+28);pet.energy=Math.max(0,pet.energy-14);pet.bond=Math.min(100,pet.bond+5);
    gainXP(10);
    petMem.playTotal++;shiftP('hyperactif',3);shiftP('cynique',-1);updateFav();
    typeDialogue(getPick(D.played,pet));
    checkQ('play');
  } else if(a==='sleep'){
    if(pet.sleeping){typeDialogue('Je dors déjà. Chut.');return;}
    pet.sleeping=true;
    typeDialogue('Ok. Je ferme les yeux. Préviens-moi si quelque chose explose.');
  } else if(a==='wash'){
    const dirty=pet.clean<60;
    pet.clean=Math.min(100,pet.clean+50);pet.bond=Math.min(100,pet.bond+2);
    if(pet.sick&&pet.clean>60){pet.sick=false;pet.health=Math.min(100,pet.health+15);}
    gainXP(6);
    petMem.washTotal++;updateFav();
    typeDialogue(getPick(dirty?D.washed_dirty:D.washed_clean,pet));
    checkQ('wash');
  } else if(a==='heal'){
    if(pet.health>80&&!pet.sick){typeDialogue(getPick(D.healed_healthy,pet));return;}
    pet.health=Math.min(100,pet.health+40);pet.sick=false;pet.bond=Math.min(100,pet.bond+3);
    gainXP(12);
    petMem.healTotal++;
    typeDialogue(getPick(D.healed,pet));
    checkQ('heal');
  } else if(a==='gift'){
    const keys=Object.keys(GIFT_DEFS);
    const g=keys[Math.floor(Math.random()*keys.length)];
    pet.happy=Math.min(100,pet.happy+15);pet.bond=Math.min(100,pet.bond+6);
    pet.inventory[g]=(pet.inventory[g]||0)+1;
    gainXP(15);
    petMem.giftTotal++;shiftP('affectueux',4);shiftP('cynique',-2);updateFav();
    if(g==='pizza')petMem.pizzaCount++;
    if(g==='fleur')petMem.fleurCount++;
    const EMOJI=GIFT_DEFS[g].icon;
    typeDialogue(EMOJI+' '+getPick(D.gifts[g],pet));
    renderInventory();
    checkQ('gift',g);
  }
  savePet();
  updateUI();
}

// ══════════════════════════════════════════════════════
//  MINI-JEU 1 : RYTHME 3 LANES
//  3 colonnes G/M/D — beats tombent dans une lane aléatoire
//  Tap sur la bonne zone en bas pour valider
// ══════════════════════════════════════════════════════
const LANE_COLORS=['#ff6eb4','#ffe066','#7ec8e3'];
const LANE_KEYS=['G','M','D'];

function getLaneZones(){
  const w=CW/3;
  return [0,1,2].map(i=>({x:i*w,w,hitY:CH-36,hitH:30}));
}

function startRhythm(){
  if(!pet||!pet.alive||pet.sleeping) return;
  if(activeGame==='rhythm'){endRhythm();return;}
  activeGame='rhythm';
  const bpm=110, beatMs=60000/bpm;
  Object.assign(RHYTHM,{
    active:true, beats:[], nextBeat:performance.now()+beatMs*1.5,
    score:0, combo:0, maxCombo:0, misses:0,
    bpm, beatMs, over:false,
    maxTime:25000, particles:[], startTime:performance.now(),
    speed:1.0   // multiplier increases over time
  });
  document.getElementById('btn-rhythm').classList.add('active-game');
  typeDialogue(getPick(D.game_start,pet));
  gc.addEventListener('touchstart',rhythmTap,{passive:false});
  gc.addEventListener('mousedown',rhythmTap);
}

function endRhythm(){
  activeGame=null; RHYTHM.active=false;
  gc.removeEventListener('touchstart',rhythmTap);
  gc.removeEventListener('mousedown',rhythmTap);
  document.getElementById('btn-rhythm').classList.remove('active-game');
  const sc=RHYTHM.score;
  if(sc>petMem.rhythmBest)petMem.rhythmBest=sc;
  pet.happy=Math.min(100,pet.happy+10);pet.bond=Math.min(100,pet.bond+3);
  gainXP(Math.max(5,sc*2));
  typeDialogue(getPick(sc>=12?D.game_rhythm_win:D.game_rhythm_lose,pet));
  checkQ('rhythm',sc);
  updateUI();
}

function rhythmTap(e){
  if(!RHYTHM.active) return;
  if(e.type==='touchstart') e.preventDefault();
  const r=gc.getBoundingClientRect();
  const cx=e.type==='touchstart'?(e.touches[0].clientX-r.left)/(r.width/CW):(e.clientX-r.left)/(r.width/CW);
  const lane=cx<CW/3?0:cx<CW*2/3?1:2;
  const now=performance.now();
  const hitWindow=Math.max(90,180-RHYTHM.score*3);
  // Find nearest unhit beat in that lane within window
  const zones=getLaneZones();
  const z=zones[lane];
  const hit=RHYTHM.beats.find(b=>!b.hit&&b.lane===lane&&Math.abs(b.time-now)<hitWindow);
  if(hit){
    hit.hit=true;
    RHYTHM.score++; RHYTHM.combo++;
    RHYTHM.maxCombo=Math.max(RHYTHM.maxCombo,RHYTHM.combo);
    playSound('rhythm_ok');
    vibrate([20]);
    RHYTHM.particles.push({x:z.x+z.w/2,y:z.hitY,life:22,lane,combo:RHYTHM.combo,ok:true});
  } else {
    RHYTHM.combo=0; RHYTHM.misses++;
    playSound('rhythm_miss');
    vibrate([60,30]);
    RHYTHM.particles.push({x:z.x+z.w/2,y:z.hitY-10,life:18,lane,ok:false});
  }
}

function updateRhythm(){
  if(!RHYTHM.active) return;
  const now=performance.now();
  const elapsed=now-RHYTHM.startTime;
  if(elapsed>RHYTHM.maxTime){endRhythm();return;}
  // Speed ramps up over time
  RHYTHM.speed=1+elapsed/RHYTHM.maxTime*1.4;
  const beatMs=RHYTHM.beatMs/RHYTHM.speed;
  // Spawn beats — ensure variety: track last 3 lanes to avoid >2 same in a row
  while(RHYTHM.nextBeat<now+2200){
    const recent=(RHYTHM.beats.slice(-2)||[]).map(b=>b.lane);
    let lane;
    // Force a different lane if last 2 were same
    if(recent.length>=2&&recent[0]===recent[1]){
      const avoid=recent[0];
      const opts=[0,1,2].filter(l=>l!==avoid);
      lane=opts[Math.floor(Math.random()*opts.length)];
    } else {
      lane=Math.floor(Math.random()*3);
    }
    RHYTHM.beats.push({time:RHYTHM.nextBeat,lane,hit:false});
    RHYTHM.nextBeat+=beatMs*(0.85+Math.random()*0.3);
  }
  RHYTHM.beats=RHYTHM.beats.filter(b=>b.time>now-600);
  RHYTHM.particles=RHYTHM.particles.filter(p=>p.life-->0);
}

// ══════════════════════════════════════════════════════
//  MINI-JEU 2 : SIMON (memory)
//  Séquence garantie d'utiliser les 4 touches régulièrement
//  Vitesse d'affichage augmente à chaque round
// ══════════════════════════════════════════════════════
const MEM_COLORS=['#ff2244','#39ff14','#00d4ff','#ffb000'];
const MEM_LABELS=['R','G','B','Y'];
const MEM_FREQS=[220,330,440,550]; // note par bouton

function startMemory(){
  if(!pet||!pet.alive||pet.sleeping) return;
  if(activeGame==='memory'){endMemory(false);return;}
  activeGame='memory';
  Object.assign(MEMORY,{
    active:true, sequence:[], playerSeq:[],
    showing:false, showIdx:0, waitPlayer:false,
    score:0, bestScore:MEMORY.bestScore||0,
    over:false, flash:'', flashT:0, litBtn:-1, litT:0,
    // Boutons en positions fixes 2x2
    btnLayout:[0,1,2,3]
  });
  document.getElementById('btn-memory').classList.add('active-game');
  typeDialogue(getPick(D.game_start,pet));
  gc.addEventListener('touchstart',memoryTap,{passive:false});
  gc.addEventListener('mousedown',memoryTap);
  setTimeout(()=>memoryNextRound(),900);
}

function endMemory(win){
  activeGame=null; MEMORY.active=false;
  gc.removeEventListener('touchstart',memoryTap);
  gc.removeEventListener('mousedown',memoryTap);
  document.getElementById('btn-memory').classList.remove('active-game');
  const sc=MEMORY.score;
  if(sc>MEMORY.bestScore)MEMORY.bestScore=sc;
  if(sc>(petMem.memoryBest||0))petMem.memoryBest=sc;
  gainXP(Math.max(5,sc*4));
  pet.happy=Math.min(100,pet.happy+10);pet.bond=Math.min(100,pet.bond+3);
  typeDialogue(getPick(win||sc>=3?D.game_memory_win:D.game_memory_lose,pet));
  checkQ('memory',sc);
  updateUI();
}

function memoryNextRound(){
  if(!MEMORY.active) return;
  // Guarantee all 4 buttons appear: every 4 rounds add a full shuffle of [0,1,2,3]
  const len=MEMORY.sequence.length;
  if(len%4===0){
    // Shuffle [0,1,2,3] and add
    const pool=[0,1,2,3].sort(()=>Math.random()-.5);
    MEMORY.sequence.push(pool[0]);
  } else {
    // Pick a color different from last one
    const last=MEMORY.sequence[MEMORY.sequence.length-1];
    let next;
    do { next=Math.floor(Math.random()*4); } while(next===last);
    MEMORY.sequence.push(next);
  }
  MEMORY.playerSeq=[]; MEMORY.showing=true; MEMORY.showIdx=0; MEMORY.waitPlayer=false;
  // Speed: interval reduces by 30ms per round, min 250ms
  const interval=Math.max(250,700-MEMORY.score*30);
  setTimeout(()=>memoryShowNext(interval),500);
}

function memoryShowNext(interval){
  if(!MEMORY.active) return;
  if(MEMORY.showIdx>=MEMORY.sequence.length){
    MEMORY.showing=false; MEMORY.waitPlayer=true;
    MEMORY.litBtn=-1;
    return;
  }
  MEMORY.litBtn=MEMORY.sequence[MEMORY.showIdx];
  MEMORY.litT=Math.round(interval*0.55/16); // frames lit
  // Play note for this button
  const freq=MEM_FREQS[MEMORY.litBtn];
  beep(freq,.15,.18,'square');
  MEMORY.showIdx++;
  setTimeout(()=>{ MEMORY.litBtn=-1; setTimeout(()=>memoryShowNext(interval),interval*0.3); },interval*0.55);
}

function memoryTap(e){
  if(!MEMORY.active||!MEMORY.waitPlayer) return;
  if(e.type==='touchstart') e.preventDefault();
  const r=gc.getBoundingClientRect();
  const cx=e.type==='touchstart'?(e.touches[0].clientX-r.left)/(r.width/CW):(e.clientX-r.left)/(r.width/CW);
  const cy=e.type==='touchstart'?(e.touches[0].clientY-r.top)/(r.height/CH):(e.clientY-r.top)/(r.height/CH);
  const buttons=getMemoryButtons();
  for(let i=0;i<4;i++){
    const b=buttons[i];
    if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){
      const colorIdx=MEMORY.btnLayout[i];
      MEMORY.litBtn=i; MEMORY.litT=14;
      beep(MEM_FREQS[colorIdx],.1,.15,'square');
      MEMORY.playerSeq.push(colorIdx);
      const expected=MEMORY.sequence[MEMORY.playerSeq.length-1];
      if(colorIdx===expected){
        playSound('memory_ok');
        vibrate([15]);
        if(MEMORY.playerSeq.length===MEMORY.sequence.length){
          MEMORY.score++; MEMORY.flash='✓'; MEMORY.flashT=28;
          setTimeout(()=>memoryNextRound(),700);
        }
      } else {
        playSound('memory_fail');
        vibrate([80,40,80]);
        MEMORY.flash='✗'; MEMORY.flashT=40;
        setTimeout(()=>endMemory(false),700);
      }
      return;
    }
  }
}

function getMemoryButtons(){
  // 2x2 grid, large buttons, centered
  const bw=110,bh=70,gap=10;
  const startX=(CW-bw*2-gap)/2, startY=CH/2-bh-gap/2;
  return [
    {x:startX,       y:startY,       w:bw,h:bh, ci:0},
    {x:startX+bw+gap,y:startY,       w:bw,h:bh, ci:1},
    {x:startX,       y:startY+bh+gap,w:bw,h:bh, ci:2},
    {x:startX+bw+gap,y:startY+bh+gap,w:bw,h:bh, ci:3},
  ];
}

const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
gc.width=CW; gc.height=CH;

function getMood(){
  if(!pet)return 'ok';
  if(!pet.alive)return 'dead';
  if(pet.sick)return 'sick';
  if(pet.hunger<20)return 'hungry';
  if(pet.energy<20)return 'tired';
  if(pet.happy<25&&pet.bond<20)return 'angry';
  if(pet.happy<35)return 'sad';
  if(pet.happy>75&&pet.hunger>60&&pet.energy>50)return 'great';
  return 'ok';
}
function triggerAnim(mode){ANIM.mode=mode;ANIM.actionT=30;setTimeout(()=>{if(ANIM.mode===mode)ANIM.mode='idle';},500);}

function render(){
  ctx.clearRect(0,0,CW,CH);
  drawDayNightBg();
  drawGrid();
  if(activeGame==='rhythm') drawRhythm();
  else if(activeGame==='memory') drawMemoryGame();
  else drawPetScreen();
  drawDayNightOverlay();
  requestAnimationFrame(render);
  frame++;
}

function drawGrid(){
  ctx.strokeStyle='rgba(180,140,255,0.05)';ctx.lineWidth=1;
  for(let x=0;x<CW;x+=16){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=16){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
}

// ── PET SCREEN ──────────────────────────────────
function drawPetScreen(){
  const t=frame*.055, mood=getMood();
  const floorY=CH-22;
  ctx.strokeStyle='rgba(255,157,226,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(20,floorY);ctx.lineTo(CW-20,floorY);ctx.stroke();

  // Idle walk logic
  if(!pet.sleeping&&ANIM.mode==='idle'){
    ANIM.idleT++;
    if(ANIM.idleT>100){
      ANIM.walkDir=Math.random()<.5?-1:1;ANIM.mode='walk';
      setTimeout(()=>{ANIM.mode='idle';},900+Math.random()*700);ANIM.idleT=0;
    }
  }
  if(ANIM.mode==='walk'){
    ANIM.walkX+=ANIM.walkDir*1.1;
    if(ANIM.walkX<-55||ANIM.walkX>55)ANIM.walkDir*=-1;
  }

  const bX=CW/2+ANIM.walkX, bY=floorY;
  const sc=pet.stage==='bébé'?0.75:pet.stage==='enfant'?0.88:pet.stage==='ancien'?1.05:1.0;

  drawCharacter(bX,bY,sc,t,mood);

  // Shadow
  ctx.fillStyle='rgba(180,140,255,0.15)';
  ctx.beginPath();ctx.ellipse(bX,bY+2,18*sc,4,0,0,Math.PI*2);ctx.fill();

  // Aura at high level
  if(pet.level>=5){
    const alpha=(Math.sin(t*2)+1)/2*0.15+0.05;
    ctx.strokeStyle=`rgba(255,157,226,${alpha})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(bX,bY-30*sc,28*sc,0,Math.PI*2);ctx.stroke();
  }

  if(pet.sick) drawSickParticles(bX,bY,sc,t);
  if(pet.sleeping) drawZzz(bX,bY,sc,t);
  if(pet.hunger<22&&!pet.sleeping){
    const a=(Math.sin(t*5)+1)/2;
    ctx.fillStyle=`rgba(255,100,150,${0.5+a*0.5})`;
    ctx.font=`8px 'Press Start 2P',monospace`;
    ctx.fillText('!',bX-4,bY-72*sc);
  }
  if(typeof drawEquipped==='function') drawEquipped(bX,bY,sc,t);
}

// ── LICORNE KAWAII — stade-aware ──────────────────
function drawCharacter(cx, by, sc, t, mood){
  const alive = pet.alive;
  const stage = pet.stage;
  const walk  = ANIM.mode === 'walk';
  const action= ANIM.mode === 'action' && ANIM.actionT > 0;
  if(action) ANIM.actionT--;
  const bounce = pet.sleeping ? 0 : Math.sin(t * 1.8) * 1.8;

  // Couleurs licorne
  const WHITE  = '#f0f8ff';
  const LIGHT  = '#d6eeff';
  const BLUE   = '#7ec8e3';
  const BBLUE  = '#4aa8cc';
  const YELLOW = '#ffe066';
  const GOLD   = '#ffb700';
  const PINK   = '#ffb3d9';
  const PURPLE = '#c084fc';
  const MANE1  = '#7ec8e3'; // bleu ciel
  const MANE2  = '#ffe066'; // jaune
  const MANE3  = '#ffffff'; // blanc

  const P = Math.round(7 * sc);
  const hY = by - P * 11 + bounce;

  // ── QUEUE (derrière) ──
  const tailSwing = walk ? Math.sin(t * 6) * P : Math.sin(t * 2) * P * 0.4;
  const tailX = cx - P * 2.5, tailY = by - P * 4 + bounce;
  [[MANE1,0],[MANE2,P],[MANE3,P*2]].forEach(([c,dy],i)=>{
    fillPx(tailX - tailSwing*0.3 - i*P*0.3, tailY + dy, P, P*2, c);
  });

  // ── PATTES ──
  const legSwing = walk ? Math.sin(t * 8) * P * 1.2 : 0;
  // Arrières
  fillPx(cx - P*1.8, by - P*0.5 - legSwing*0.4, P*1.2, P*3, LIGHT);
  fillPx(cx + P*0.6, by - P*0.5 + legSwing*0.4, P*1.2, P*3, LIGHT);
  // Sabots arrières
  fillPx(cx - P*1.8, by - P*0.5 - legSwing*0.4 + P*3, P*1.2, P*0.8, BBLUE);
  fillPx(cx + P*0.6, by - P*0.5 + legSwing*0.4 + P*3, P*1.2, P*0.8, BBLUE);

  // ── CORPS ──
  const bodyY = by - P*6 + bounce;
  // Corps principal ovale
  for(let py=-2; py<=3; py++){
    const w = py===-2||py===3 ? P*4 : py===-1||py===2 ? P*5 : P*6;
    const ox = -w/2;
    fillPx(cx+ox, bodyY+py*P, w, P, py%2===0?WHITE:LIGHT);
  }
  // Ventre tacheté kawaii
  fillPx(cx-P, bodyY+P*1.5, P*0.6, P*0.6, BLUE);
  fillPx(cx+P*0.6, bodyY+P, P*0.6, P*0.6, YELLOW);

  // ── PATTES AVANT ──
  fillPx(cx - P*1.5, bodyY+P*3, P*1.2, P*3.5, LIGHT);
  fillPx(cx + P*0.3, bodyY+P*3, P*1.2, P*3.5, LIGHT);
  fillPx(cx - P*1.5, bodyY+P*3+P*3.5, P*1.2, P*0.8, BBLUE);
  fillPx(cx + P*0.3, bodyY+P*3+P*3.5, P*1.2, P*0.8, BBLUE);

  // ── COU ──
  fillPx(cx - P*0.8, bodyY - P*1.5, P*2, P*2, WHITE);

  // ── TÊTE ──
  const headW = P*5, headH = P*4.5;
  const headX = cx - headW/2, headTop = hY - headH/2;
  // Tête ronde
  for(let py=0; py<5; py++){
    const w = py===0||py===4 ? P*3 : py===1||py===3 ? P*4.5 : P*5;
    fillPx(cx-w/2, headTop+py*P, w, P, WHITE);
  }
  // Joues roses kawaii
  fillPx(cx - P*2.5, hY + P*0.5, P*1.2, P*0.7, PINK);
  fillPx(cx + P*1.3, hY + P*0.5, P*1.2, P*0.7, PINK);

  // ── CRINIÈRE ──
  const maneOff = Math.sin(t*2)*P*0.3;
  [[MANE1,-P*0.5],[MANE2,0],[MANE3,P*0.5]].forEach(([c,ox],i)=>{
    fillPx(cx + P*1.8 + ox + maneOff, headTop - P*0.5 + i*P*0.4, P, P*4 + i*P*0.3, c);
  });
  // Mèche sur le front
  fillPx(cx - P*0.5, headTop - P*0.5, P, P*1.5, MANE1);
  fillPx(cx - P*1.2, headTop, P*0.8, P, MANE2);

  // ── CORNE ──
  const hornX = cx - P*0.5, hornY = headTop - P*2.5;
  // Spirale de la corne
  fillPx(hornX, hornY + P*2, P, P, GOLD);
  fillPx(hornX + P*0.2, hornY + P, P*0.8, P, YELLOW);
  fillPx(hornX + P*0.3, hornY, P*0.6, P, WHITE);
  fillPx(hornX + P*0.4, hornY - P*0.8, P*0.4, P*0.8, WHITE);
  // Brillance corne
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  fillPx(hornX - P*0.1, hornY + P*0.5, P*0.3, P*0.3, 'rgba(255,255,255,0.8)');

  // ── YEUX ──
  const eyeY = hY - P*0.3;
  const blink = Math.sin(t * 0.28) > 0.93;

  if(!alive){
    // Yeux X
    ctx.fillStyle = '#ff6b9d';
    fillPx(cx-P*1.8, eyeY-P*0.5, P*0.7, P*0.7, '#ff6b9d');
    fillPx(cx-P*1.2, eyeY+P*0.1, P*0.7, P*0.7, '#ff6b9d');
    fillPx(cx+P*0.5, eyeY-P*0.5, P*0.7, P*0.7, '#ff6b9d');
    fillPx(cx+P*1.1, eyeY+P*0.1, P*0.7, P*0.7, '#ff6b9d');
  } else if(blink){
    // Yeux fermés = trait
    fillPx(cx-P*1.8, eyeY+P*0.3, P*1.4, P*0.4, BBLUE);
    fillPx(cx+P*0.4, eyeY+P*0.3, P*1.4, P*0.4, BBLUE);
  } else {
    // Grands yeux kawaii
    const eyeH = mood==='sad'||mood==='sick' ? P*1.2 : P*1.6;
    // Blanc de l'oeil
    fillPx(cx-P*2, eyeY-eyeH/2, P*1.5, eyeH, 'white');
    fillPx(cx+P*0.5, eyeY-eyeH/2, P*1.5, eyeH, 'white');
    // Iris bleu
    const irisOff = mood==='sad'?P*0.3:mood==='angry'?-P*0.2:0;
    fillPx(cx-P*1.8, eyeY-eyeH/2+P*0.2+irisOff, P*1.1, eyeH*0.7, BLUE);
    fillPx(cx+P*0.7, eyeY-eyeH/2+P*0.2+irisOff, P*1.1, eyeH*0.7, BLUE);
    // Pupille
    fillPx(cx-P*1.5, eyeY-eyeH/2+P*0.4+irisOff, P*0.6, eyeH*0.45, '#1a3a4a');
    fillPx(cx+P*0.9, eyeY-eyeH/2+P*0.4+irisOff, P*0.6, eyeH*0.45, '#1a3a4a');
    // Reflet kawaii
    fillPx(cx-P*1.3, eyeY-eyeH/2+P*0.15+irisOff, P*0.4, P*0.4, 'white');
    fillPx(cx+P*1.1, eyeY-eyeH/2+P*0.15+irisOff, P*0.4, P*0.4, 'white');
    // Cils haut
    if(mood!=='sad'&&mood!=='sick'){
      fillPx(cx-P*2.1, eyeY-eyeH/2-P*0.2, P*0.4, P*0.4, BBLUE);
      fillPx(cx-P*0.8, eyeY-eyeH/2-P*0.3, P*0.4, P*0.5, BBLUE);
      fillPx(cx+P*0.4, eyeY-eyeH/2-P*0.2, P*0.4, P*0.4, BBLUE);
      fillPx(cx+P*1.7, eyeY-eyeH/2-P*0.3, P*0.4, P*0.5, BBLUE);
    }
    // Étoiles dans les yeux si happy
    if(mood==='great'){
      ctx.fillStyle='rgba(255,224,102,0.9)';
      ctx.font=`${Math.round(P*0.8)}px serif`;
      ctx.fillText('★', cx-P*1.9, eyeY+P*0.2);
      ctx.fillText('★', cx+P*0.6, eyeY+P*0.2);
    }
  }

  // ── BOUCHE ──
  const mY = hY + P*1.2;
  if(mood==='great'||(alive&&pet&&pet.happy>65)){
    // Sourire en w kawaii
    fillPx(cx-P*0.8, mY, P*0.6, P*0.5, BBLUE);
    fillPx(cx-P*0.2, mY+P*0.3, P*0.6, P*0.5, BBLUE);
    fillPx(cx+P*0.4, mY, P*0.6, P*0.5, BBLUE);
    // Petit trait au milieu
    fillPx(cx-P*0.1, mY+P*0.5, P*0.3, P*0.3, BBLUE);
  } else if(mood==='sad'||mood==='angry'||!alive){
    fillPx(cx-P*0.8, mY+P*0.5, P*1.6, P*0.4, BBLUE);
    fillPx(cx-P*1.0, mY, P*0.5, P*0.5, BBLUE);
    fillPx(cx+P*0.5, mY, P*0.5, P*0.5, BBLUE);
  } else {
    fillPx(cx-P*0.5, mY+P*0.2, P*1, P*0.4, BBLUE);
  }

  // ── STADE ANCIEN : ailes + couronne de fleurs ──
  if(stage==='ancien'){
    // Aile gauche
    const wingY = bodyY + P;
    [[WHITE,0],[LIGHT,P],[BLUE,P*2]].forEach(([c,dy])=>{
      fillPx(cx-P*5-dy*0.3, wingY+dy, P*3+dy*0.2, P, c);
    });
    // Aile droite
    [[WHITE,0],[LIGHT,P],[BLUE,P*2]].forEach(([c,dy])=>{
      fillPx(cx+P*3+dy*0.3, wingY+dy, P*3+dy*0.2, P, c);
    });
    // Couronne de fleurs
    [[-P*1.5,PINK],[0,YELLOW],[P*1.5,PURPLE]].forEach(([ox,c])=>{
      fillPx(cx+ox-P*0.3, headTop-P*0.8, P*0.7, P*0.7, c);
    });
  }

  // ── STADE BÉBÉ : plus petit, plus rond ──
  // (géré via sc=0.75 déjà)

  // ── PARTICULES CŒUR si GREAT ──
  if(mood==='great'&&Math.random()<0.04){
    ctx.fillStyle='rgba(255,100,150,0.7)';
    ctx.font=`${Math.round(P*1.2)}px serif`;
    ctx.fillText('♥', cx+P*3+Math.random()*P*2, hY-P*4-Math.random()*P*2);
  }

  // ── ÉTOILES MAGIQUES autour si level >= 3 ──
  if(pet&&pet.level>=3){
    const a = t*1.8;
    ctx.font=`${Math.round(P*0.9)}px serif`;
    ctx.fillText('✦', cx+Math.cos(a)*P*5, (by-P*5+bounce)+Math.sin(a)*P*2);
    ctx.fillText('✦', cx+Math.cos(a+Math.PI)*P*4.5, (by-P*5+bounce)+Math.sin(a+Math.PI)*P*1.5);
  }
}

function drawSickParticles(cx,by,sc,t){
  for(let i=0;i<3;i++){
    const a=t*2+i*2.1, r=20*sc;
    ctx.fillStyle=`rgba(255,150,200,${.3+Math.sin(t*3+i)*.2})`;
    ctx.font='9px serif';
    ctx.fillText('💫',cx+Math.cos(a)*r-4,by-42*sc+Math.sin(a)*r);
  }
}
function drawZzz(cx,by,sc,t){
  ['z','z','Z'].forEach((z,i)=>{
    ctx.fillStyle=`rgba(180,140,255,${(Math.sin(t+i*1.5)+1)/2*.9})`;
    ctx.font=`${8+i*3}px 'Press Start 2P',monospace`;
    ctx.fillText(z,cx+20+i*9,by-42*sc-i*9+Math.sin(t+i)*3);
  });
}

const var_green='#ff9de2';

// ── RHYTHM RENDERER — 3 lanes ────────────────────
function drawRhythm(){
  updateRhythm();
  const now=performance.now();
  const elapsed=now-RHYTHM.startTime;
  const progress=Math.min(1,elapsed/RHYTHM.maxTime);

  // Lane backgrounds
  const laneW=CW/3;
  [0,1,2].forEach(i=>{
    ctx.fillStyle=`rgba(${hexRgb(LANE_COLORS[i])},0.04)`;
    ctx.fillRect(i*laneW,0,laneW,CH);
  });
  // Lane dividers
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(laneW,0);ctx.lineTo(laneW,CH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(laneW*2,0);ctx.lineTo(laneW*2,CH);ctx.stroke();

  // Hit zones at bottom
  const zones=getLaneZones();
  zones.forEach((z,i)=>{
    ctx.fillStyle=`rgba(${hexRgb(LANE_COLORS[i])},0.15)`;
    ctx.fillRect(z.x+2,z.hitY,z.w-4,z.hitH);
    ctx.strokeStyle=`rgba(${hexRgb(LANE_COLORS[i])},0.6)`;
    ctx.lineWidth=2;ctx.strokeRect(z.x+2,z.hitY,z.w-4,z.hitH);
    // Label
    ctx.fillStyle=`rgba(${hexRgb(LANE_COLORS[i])},0.8)`;
    ctx.font=`7px 'Press Start 2P',monospace`;
    ctx.fillText(LANE_KEYS[i],z.x+z.w/2-4,z.hitY+z.hitH/2+3);
  });

  // Beats falling
  for(const b of RHYTHM.beats){
    const timeUntil=b.time-now;
    if(timeUntil<-300||timeUntil>2500) continue;
    const z=zones[b.lane];
    const travelH=z.hitY-10;
    const y=10+(1-timeUntil/2500)*travelH;
    const alpha=b.hit?0.15:0.95;
    ctx.fillStyle=`rgba(${hexRgb(LANE_COLORS[b.lane])},${alpha})`;
    ctx.fillRect(z.x+8,y-8,z.w-16,16);
    if(!b.hit){
      ctx.shadowColor=LANE_COLORS[b.lane];ctx.shadowBlur=6;
      ctx.fillRect(z.x+8,y-8,z.w-16,16);
      ctx.shadowBlur=0;
    }
  }

  // Progress bar
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,CW,8);
  ctx.fillStyle='#ff9de2';ctx.fillRect(0,0,CW*progress,8);

  // HUD
  ctx.fillStyle='rgba(255,157,226,.9)';ctx.font=`7px 'Press Start 2P',monospace`;
  ctx.fillText(`${RHYTHM.score}`,8,20);
  if(RHYTHM.combo>1){
    ctx.fillStyle='rgba(255,176,0,.9)';
    ctx.fillText(`×${RHYTHM.combo}`,CW/2-12,20);
  }

  // Particles
  for(const p of RHYTHM.particles){
    const a=p.life/22;
    const z=zones[p.lane];
    if(p.ok){
      ctx.fillStyle=`rgba(${hexRgb(LANE_COLORS[p.lane])},${a})`;
      ctx.font=`8px 'Press Start 2P',monospace`;
      ctx.fillText(p.combo>3?`×${p.combo}!`:'OK',p.x-8,p.y-p.life*2.5);
    } else {
      ctx.fillStyle=`rgba(255,34,68,${a})`;
      ctx.font=`7px 'Press Start 2P',monospace`;
      ctx.fillText('✗',p.x-4,p.y-p.life*2);
    }
  }
}

// ── MEMORY/SIMON RENDERER ────────────────────────
function drawMemoryGame(){
  if(MEMORY.litT>0) MEMORY.litT--;

  // Header
  ctx.fillStyle='rgba(255,157,226,.9)';ctx.font=`7px 'Press Start 2P',monospace`;
  ctx.fillText(`SCORE: ${MEMORY.score}`,8,14);
  if(MEMORY.bestScore>0){ctx.fillStyle='rgba(168,85,247,.7)';ctx.fillText(`BEST: ${MEMORY.bestScore}`,CW-75,14);}

  const status=MEMORY.showing?'OBSERVE...':MEMORY.waitPlayer?'REPRODUIS !':'';
  if(status){
    ctx.fillStyle='rgba(255,176,0,.85)';ctx.font=`7px 'Press Start 2P',monospace`;
    ctx.fillText(status,CW/2-status.length*4.5,32);
  }

  // 2x2 big buttons
  const btns=getMemoryButtons();
  btns.forEach((b,i)=>{
    const ci=MEMORY.btnLayout[i];
    const lit=(MEMORY.litBtn===i||MEMORY.litBtn===ci)&&MEMORY.litT>0;
    const baseCol=MEM_COLORS[ci];
    ctx.fillStyle=lit?baseCol:darken(baseCol,.25);
    ctx.fillRect(b.x,b.y,b.w,b.h);
    // Border
    ctx.strokeStyle=lit?baseCol:darken(baseCol,.5);
    ctx.lineWidth=lit?3:2;
    ctx.strokeRect(b.x,b.y,b.w,b.h);
    if(lit){ctx.shadowColor=baseCol;ctx.shadowBlur=14;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0;}
    // Label
    ctx.fillStyle=lit?'#fff':`rgba(255,255,255,0.5)`;
    ctx.font=`9px 'Press Start 2P',monospace`;
    ctx.fillText(MEM_LABELS[ci],b.x+b.w/2-5,b.y+b.h/2+4);
  });

  // Flash result
  if(MEMORY.flashT>0){
    MEMORY.flashT--;
    const a=MEMORY.flashT/40;
    const ok=MEMORY.flash==='✓';
    ctx.fillStyle=`rgba(${ok?'57,255,20':'255,34,68'},${a*.5})`;
    ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle=ok?var_green:'#ff2244';
    ctx.font=`20px 'Press Start 2P',monospace`;
    ctx.fillText(MEMORY.flash,CW/2-12,CH*.82);
  }

  // Progress dots — séquence actuelle
  const dotY=CH-10;
  const total=MEMORY.sequence.length;
  const dSpacing=Math.min(14,CW/(total+1));
  MEMORY.sequence.forEach((ci,i)=>{
    const done=i<MEMORY.playerSeq.length;
    ctx.fillStyle=done?MEM_COLORS[ci]:darken(MEM_COLORS[ci],.35);
    if(done){ctx.shadowColor=MEM_COLORS[ci];ctx.shadowBlur=5;}
    ctx.beginPath();ctx.arc(CW/2+(i-total/2+.5)*dSpacing,dotY,done?5:3.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
}

function darken(h,f){
  if(!h||h[0]!=='#')return h||'#000';
  const r=Math.round(parseInt(h.slice(1,3),16)*f),g=Math.round(parseInt(h.slice(3,5),16)*f),b=Math.round(parseInt(h.slice(5,7),16)*f);

}

const SAVE_KEY='pixelpet_v5';

function savePet(){
  if(!pet)return;
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({
    pet:{...pet},rt:Date.now(),
    pm:{...petMem},ps:{...personality},
    quest:currentQuest?{...currentQuest}:null,
    qp:questProgress,qcd:questCooldown,
    eq:{...equipped},
  }));}catch(e){}
}
setInterval(savePet,30000);

function loadSave(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(!d.pet||!d.pet.alive)return false;
    pet=d.pet;
    petMem=d.pm||freshMem();
    personality=d.ps||freshPersonality();
    currentQuest=d.quest||null;
    questProgress=d.qp||0;
    questCooldown=d.qcd||0;
    equipped=d.eq||{};
    const offMs=Date.now()-(d.rt||Date.now());
    const offMin=Math.floor(offMs/60000);
    const ticks=Math.min(Math.floor(offMin*2),720);
    const dm=Math.max(0.5,1-(pet.level||1)*0.04);
    pet.hunger =Math.max(0,pet.hunger -(ticks*0.4*dm));
    pet.happy  =Math.max(0,pet.happy  -(ticks*0.25*dm));
    pet.energy =Math.max(0,pet.energy -(ticks*0.18*dm));
    pet.clean  =Math.max(0,pet.clean  -(ticks*0.15*dm));
    if(pet.sick)pet.health=Math.max(0,pet.health-(ticks*0.2));
    return offMin;
  }catch(e){return false;}
}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

function offlineMsg(min){
  if(min<2)return null;
  if(min<10)return `T'étais où ? C'était court mais j'ai remarqué.`;
  if(min<60)return `Tu es parti ${min} minutes. J'ai compté.`;
  const h=Math.floor(min/60);
  if(h<6)return `${h} heure${h>1?"s":""}. Je m'en remets.`;
  if(h<24)return `${h} heures. J'ai failli croire que t'existais plus.`;
  const dd=Math.floor(h/24);
  return `${dd} jour${dd>1?"s":""}. C'est long. J'ai changé.`;
}

function trySpawnQuest(){
  if(currentQuest||questCooldown>0){if(questCooldown>0)questCooldown--;return;}
  if(!pet||pet.age<4||Math.random()>0.3)return;
  const el=QUESTS.filter(q=>!(q.type==='level'&&q.target<=pet.level));
  if(!el.length)return;
  currentQuest={...el[Math.floor(Math.random()*el.length)]};
  questProgress=0;
  typeDialogue('💭 '+currentQuest.text);
  updateQuestUI();
}

function checkQ(type,value){
  if(!currentQuest||!pet)return;
  const q=currentQuest; let done=false;
  if(q.type==='gift'     &&type==='gift'  &&value===q.target)done=true;
  if(q.type==='talk'     &&type==='talk') {questProgress++;if(questProgress>=q.target)done=true;}
  if(q.type==='play'     &&type==='play') {questProgress++;if(questProgress>=q.target)done=true;}
  if(q.type==='wash'     &&type==='wash') done=true;
  if(q.type==='heal'     &&type==='heal') done=true;
  if(q.type==='level'    &&pet.level>=q.target)done=true;
  if(q.type==='feedtotal'&&petMem.feedTotal>=q.target)done=true;
  if(q.type==='rhythm'   &&type==='rhythm'&&value>=q.target)done=true;
  if(q.type==='memory'   &&type==='memory'&&value>=q.target)done=true;
  if(done){
    pet.bond=Math.min(100,pet.bond+q.bond);
    pet.happy=Math.min(100,pet.happy+q.happy);
    gainXP(q.xp); playSound('levelup'); flashLevelUp();
    typeDialogue('✅ '+getPick(['Accompli. Merci.','Je savais que tu pouvais.',`+${q.xp} XP !`,'Signal de gratitude.'],pet));
    currentQuest=null;questProgress=0;questCooldown=5;
    updateQuestUI();savePet();
  } else updateQuestUI();
}

function updateQuestUI(){
  const el=document.getElementById('quest-box');if(!el)return;
  if(!currentQuest){el.style.display='none';return;}
  el.style.display='block';
  document.getElementById('quest-text').textContent=currentQuest.text;
  let prog='';
  if(['talk','play'].includes(currentQuest.type))prog=`Progression : ${questProgress}/${currentQuest.target}`;
  if(currentQuest.type==='feedtotal')prog=`Progression : ${petMem.feedTotal}/${currentQuest.target}`;
  document.getElementById('quest-prog').textContent=prog;
}

  couronne:{slot:'head',bonus:{happy:8,bond:5},icon:'👑'},

function equipItem(key){
  if(!pet||!pet.alive)return;
  const def=EQUIP[key];if(!def)return;
  const slot=def.slot;
  if(equipped[slot]===key){
    Object.entries(def.bonus).forEach(([s,v])=>{pet[s]=Math.max(0,(pet[s]||0)-v);});
    delete equipped[slot];
    typeDialogue("Je l'enlève. Ça change quelque chose ?");
  } else {
    if(equipped[slot]){
      const pdef=EQUIP[equipped[slot]];
      if(pdef)Object.entries(pdef.bonus).forEach(([s,v])=>{pet[s]=Math.max(0,(pet[s]||0)-v);});
    }
    equipped[slot]=key;
    Object.entries(def.bonus).forEach(([s,v])=>{pet[s]=Math.min(100,(pet[s]||0)+v);});
    typeDialogue(def.icon+' Équipé. Je me sens différent.');
  }
  playSound('gift');updateUI();renderInventory();savePet();
}

function drawEquipped(cx,by,sc,t){
  const P=Math.round(8*sc);
  const bounce=Math.sin(t*1.8)*1.3;
  const hY=by-P*10+bounce;
  if(equipped.head){
    ctx.font=`${Math.round(P*2.2)}px serif`;
    ctx.fillText(EQUIP[equipped.head].icon,cx-P*1.5,hY-P*3.2);
  }
  if(equipped.hand){
    ctx.font=`${Math.round(P*1.8)}px serif`;
    ctx.fillText(EQUIP[equipped.hand].icon,cx+P*3,by-P*4+bounce);
  }
  if(equipped.neck){
    ctx.font=`${Math.round(P*1.4)}px serif`;
    ctx.fillText(EQUIP[equipped.neck].icon,cx-P*.8,by-P*6.5+bounce);
  }
  if(equipped.aura){
    const a=t*2;
    ctx.font=`${Math.round(P*1.6)}px serif`;
    ctx.fillText('⭐',cx+Math.cos(a)*P*5-P,(by-P*6)+Math.sin(a)*P*2);
  }
}

//  CYCLE JOUR / NUIT
// ══════════════════════════════════════════════════════
function getTimeOfDay(){
  const h=new Date().getHours();
  if(h>=6&&h<9)   return {phase:'aube',     sky:'#1a0a3e',horizon:'#ff9de2',stars:false,moon:false,sun:false,dawn:true};
  if(h>=9&&h<17)  return {phase:'jour',     sky:'#0d1a3e',horizon:'#7ec8e3',stars:false,moon:false,sun:true, dawn:false};
  if(h>=17&&h<20) return {phase:'coucher',  sky:'#1a0a2e',horizon:'#ffb700',stars:false,moon:false,sun:false,dawn:true};
  if(h>=20&&h<22) return {phase:'soirée',   sky:'#0a0118',horizon:'#2d1b4e',stars:true, moon:true, sun:false,dawn:false};
  return              {phase:'nuit',     sky:'#050010',horizon:'#1a0a2e',stars:true, moon:true, sun:false,dawn:false};
}

function drawDayNightBg(){
  const tod=getTimeOfDay();
  // Gradient sky
  const grad=ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,tod.sky);
  grad.addColorStop(1,tod.horizon);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,CW,CH);

  const t=frame*.02;
  // Stars
  if(tod.stars){
    ctx.fillStyle='rgba(255,255,255,0.7)';
    // Pseudo-random but stable stars
    for(let i=0;i<22;i++){
      const sx=((i*137+43)%CW);
      const sy=((i*97+11)%(CH*0.55));
      const twinkle=(Math.sin(t+i*0.7)+1)/2;
      ctx.globalAlpha=0.3+twinkle*0.7;
      ctx.fillRect(sx,sy,1,1);
    }
    ctx.globalAlpha=1;
  }
  // Moon
  if(tod.moon){
    const mx=CW-45, my=28;
    ctx.fillStyle='rgba(255,245,200,0.9)';
    ctx.beginPath();ctx.arc(mx,my,10,0,Math.PI*2);ctx.fill();
    // Crescent shadow
    ctx.fillStyle=tod.sky;
    ctx.beginPath();ctx.arc(mx+4,my-2,8,0,Math.PI*2);ctx.fill();
    // Étoile à côté
    ctx.fillStyle='rgba(255,224,102,0.8)';
    ctx.font='10px serif'; ctx.fillText('✦',mx+14,my+4);
  }
  // Sun
  if(tod.sun){
    const sx=CW-38, sy=26;
    const glow=ctx.createRadialGradient(sx,sy,4,sx,sy,18);
    glow.addColorStop(0,'rgba(255,224,102,0.4)');
    glow.addColorStop(1,'rgba(255,224,102,0)');
    ctx.fillStyle=glow; ctx.fillRect(sx-18,sy-18,36,36);
    ctx.fillStyle='rgba(255,200,50,0.9)';
    ctx.beginPath();ctx.arc(sx,sy,8,0,Math.PI*2);ctx.fill();
  }
  // Dawn/dusk tint
  if(tod.dawn){
    ctx.fillStyle='rgba(255,100,100,0.07)';
    ctx.fillRect(0,0,CW,CH);
  }
  // Update day/night badge
  const badge=document.getElementById('daynight-badge');
  if(badge){
    const icons={aube:'🌅',jour:'☀️',coucher:'🌇',soirée:'🌆',nuit:'🌙'};
    badge.textContent=icons[tod.phase]||'';
    badge.style.display='block';
  }
  // Night bonus: pet sleeps on its own between 22h-7h
  if(tod.phase==='nuit'&&pet&&pet.alive&&!pet.sleeping&&Math.random()<0.003){
    pet.sleeping=true;
    typeDialogue('Il fait nuit. Je ferme les yeux tout seul. 💤');
  }
}

function drawDayNightOverlay(){
  const tod=getTimeOfDay();
  if(tod.phase==='nuit'){
    ctx.fillStyle='rgba(5,0,16,0.25)';
    ctx.fillRect(0,0,CW,CH);
  } else if(tod.phase==='soirée'){
    ctx.fillStyle='rgba(30,0,50,0.1)';
    ctx.fillRect(0,0,CW,CH);
  }
}

function takePhoto(){
  if(!pet||!pet.alive){typeDialogue('Je suis pas présentable là.');return;}
  vibrate([30,20,30]);
  // Render a clean frame to a temp canvas
  const tmp=document.createElement('canvas');
  tmp.width=CW; tmp.height=CH;
  const tc=tmp.getContext('2d');

  // Draw bg
  const tod=getTimeOfDay();
  const grad=tc.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,tod.sky); grad.addColorStop(1,tod.horizon);
  tc.fillStyle=grad; tc.fillRect(0,0,CW,CH);

  // Draw pet on temp canvas — swap ctx temporarily
  const realCtx=ctx;
  // We can't easily swap, so use toDataURL from main canvas + add frame
  const photoCanvas=document.createElement('canvas');
  photoCanvas.width=CW+20; photoCanvas.height=CH+50;
  const pc=photoCanvas.getContext('2d');

  // Pink frame
  pc.fillStyle='#2d1b4e';
  pc.fillRect(0,0,photoCanvas.width,photoCanvas.height);
  pc.strokeStyle='#ff9de2';
  pc.lineWidth=3;
  pc.strokeRect(4,4,photoCanvas.width-8,photoCanvas.height-8);
  // Corner stars
  ['✦','✦','✦','✦'].forEach((s,i)=>{
    pc.fillStyle='#ffe066';pc.font='12px serif';
    const cx=i<2?12:photoCanvas.width-20;
    const cy=i%2===0?14:photoCanvas.height-8;
    pc.fillText(s,cx,cy);
  });

  // Copy current canvas
  pc.drawImage(gc,10,8);

  // Caption
  pc.fillStyle='#ff9de2';
  pc.font=`7px 'Press Start 2P',monospace`;
  pc.fillText(`${pet.name}  •  LV.${pet.level}  •  ${pet.stage.toUpperCase()}`,12,CH+28);
  pc.fillStyle='rgba(255,224,102,0.7)';
  pc.font=`6px 'Press Start 2P',monospace`;
  const dateStr=new Date().toLocaleDateString('fr-FR');
  pc.fillText(`JOUR ${Math.floor(pet.age/2)}  •  ${dateStr}`,12,CH+42);

  // Download
  try{
    const link=document.createElement('a');
    link.download=`${pet.name}_pixelpet.png`;
    link.href=photoCanvas.toDataURL('image/png');
    link.click();
    typeDialogue('📸 Photo prise ! Bisous sur la photo. 💕');
  }catch(e){
    typeDialogue('📸 Oups. Photo ratée. On réessaie ?');
  }
}

// ══════════════════════════════════════════════════════
//  GÉNÉALOGIE
// ══════════════════════════════════════════════════════
let heritageData=null;

function applyHeritage(){
  if(!heritageData||!pet) return;
  setTimeout(()=>{
    if(heritageData.bonusXP>0){
      pet.xp=Math.min(xpForLevel(pet.level)-1, heritageData.bonusXP);
      updateXPBar();
    }
    if(heritageData.bonusItem&&GIFT_DEFS[heritageData.bonusItem]){
      pet.inventory[heritageData.bonusItem]=(pet.inventory[heritageData.bonusItem]||0)+1;
      renderInventory();
    }
    const bonusLine=heritageData.bonusItem
      ? `${heritageData.name} m'a laissé ${heritageData.bonusXP} XP et ${GIFT_DEFS[heritageData.bonusItem].name}. Je porte son âme.`
      : `${heritageData.name} m'a laissé ${heritageData.bonusXP} XP. Je porte son héritage.`;
    typeDialogue('🌟 '+bonusLine);
    try{localStorage.removeItem('pixelpet_heritage');}catch(e){}
    heritageData=null;
  },1400);
}
